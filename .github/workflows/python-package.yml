name: Python package

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        # matrix can stay, but we only need to open the PR on one version to avoid duplicate PRs
        python-version: ["3.14"]

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest ruff
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 1. Run Ruff Lint fixes and Formatting directly on the runner
    - name: Fix and Format with Ruff
      run: |
        ruff check --fix --exit-zero .
        ruff format .

    # 2. Only attempt to open a PR if changes were made and it's NOT a PR event itself
    - name: Create Pull Request for Style Fixes
      if: github.event_name != 'pull_request'
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "style: automated ruff formatting and fixes"
        title: "Automated Ruff Code Style Fixes"
        body: "This PR was automatically generated to resolve lint issues and apply styling using Ruff."
        branch: ruff-auto-fixes
        delete-branch: true

    # 3. Fail the PR build if the PR author has unformatted code
    - name: Verify Formatting (PR check only)
      if: github.event_name == 'pull_request'
      run: |
        ruff check .
        ruff format --check .

    - name: Test with pytest
      run: |
        pytest

