services:
  pangolin-ip-rule-manager:
    image: ghcr.io/joe-cole1/pangolin-ip-rule-manager:latest
    container_name: pangolin-ip-rule-manager
    # Defense in depth: preserve the image's non-root identity even if its
    # default USER is accidentally changed in a future release.
    user: "100:101"
    init: true

    environment:
      # Network
      LISTEN_PORT: "8080"

      # Pangolin connection — set these in Portainer or your env file
      PANGOLIN_URL: ${PANGOLIN_URL}
      PANGOLIN_TOKEN: ${PANGOLIN_TOKEN}
      ORG_ID: ${ORG_ID}
      RESOURCE_IDS: ${RESOURCE_IDS}

      # Retention and cleanup
      RETENTION_MINUTES: "1440"
      CLEANUP_INTERVAL_MINUTES: "60"
      RULE_PRIORITY: "0"
      RULES_CACHE_TTL_SECONDS: "3600"

      # State
      STATE_FILE: /data/state.json

      # Branding
      SITE_NAME: "" # Shown in HTML page header/footer. Optional

      # Available Resources Dashboard (Resource Launcher) Integration
      REDIRECT_TO_LAUNCHER: ${REDIRECT_TO_LAUNCHER:-false}
      REDIRECT_DELAY_SECONDS: ${REDIRECT_DELAY_SECONDS:-3}
      PANGOLIN_DASHBOARD_URL: ${PANGOLIN_DASHBOARD_URL:-}



      # ---------------------------------------------------------------------------
      # CrowdSec integration (optional — disabled by default)
      # ---------------------------------------------------------------------------
      CROWDSEC_ENABLED: "false"
      CROWDSEC_ALLOWLIST_NAME: pangolin-ip-rule-manager
      CROWDSEC_CACHE_TTL_SECONDS: "3600"
      CROWDSEC_CMD_PREFIX: "docker exec crowdsec"
      CROWDSEC_CSCLI_BIN: cscli

      # ---------------------------------------------------------------------------
      # Socket proxy (STRONGLY RECOMMENDED when CrowdSec is enabled)
      # ---------------------------------------------------------------------------
      # A socket proxy limits Docker API access to exec operations only, preventing
      # this container from acting as a backdoor to the full Docker daemon.
      #
      # To use: uncomment DOCKER_HOST below, the socket-proxy service, and the
      # networks section at the bottom of this file. No host permission changes
      # or raw socket mount on this service are required.
      #
      # DOCKER_HOST: tcp://socket-proxy:2375

      # ---------------------------------------------------------------------------
      # Optional endpoints
      # ---------------------------------------------------------------------------
      UPDATE_ENDPOINT_ENABLED: "false"

      # ---------------------------------------------------------------------------
      # Defense-in-depth shared secret (optional, STRONGLY RECOMMENDED)
      # ---------------------------------------------------------------------------
      # When set, the upstream proxy must inject a matching X-Proxy-Secret header or
      # the request is rejected with 403 before any state write or API call. Configure
      # Pangolin/Traefik to add this header and strip any client-supplied copy.
      # PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET}

    volumes:
      - pangolin-ip-rule-manager-data:/data

    # Uncomment when using the socket proxy:
    # networks:
    #   - default
    #   - socket-proxy

    restart: unless-stopped

    # ---------------------------------------------------------------------------
    # Runtime hardening
    # ---------------------------------------------------------------------------
    # The root filesystem is read-only; only the Docker-managed /data volume and
    # a small in-memory /tmp are writable. The image initializes new /data
    # volumes as 100:101 and automatically tightens existing volumes to mode
    # 0700, so no host chmod/chown step is required.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=16m,mode=1777
    pids_limit: 128
    cpus: "0.5"
    mem_limit: "256M"

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "256M"
          pids: 128

    # The image provides the /healthz health check. Define healthcheck here only
    # when this deployment needs to override the image's timing or test.

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Docker socket proxy (STRONGLY RECOMMENDED for CrowdSec integration)
  # ---------------------------------------------------------------------------
  # Restricts Docker API access to exec operations only. The pangolin-ip-rule-manager
  # container runs 'docker exec crowdsec cscli ...' via subprocess; the docker CLI
  # reads DOCKER_HOST and routes through the proxy instead of the raw socket.
  #
  # Required permissions for 'docker exec':
  #   CONTAINERS=1  — resolve container name to ID (GET /containers/{name}/json)
  #   EXEC=1        — create and start exec instances (POST /containers/{id}/exec,
  #                   POST /exec/{id}/start)
  #   POST=1        — allow POST methods for the above
  #   All other APIs remain disabled (default 0).
  #
  # Uncomment this entire block and the networks section below to enable.
  #
  # socket-proxy:
  #   image: tecnativa/docker-socket-proxy:v0.4.2
  #   container_name: socket-proxy
  #   environment:
  #     CONTAINERS: 1
  #     EXEC: 1
  #     PING: 1
  #     POST: 1
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   networks:
  #     - socket-proxy
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2375/_ping"]
  #     interval: 30s
  #     timeout: 5s
  #     retries: 3
  #     start_period: 10s
  #   restart: unless-stopped

volumes:
  pangolin-ip-rule-manager-data: {}

# Uncomment when using the socket proxy.
# The 'internal: true' flag prevents the proxy from having outbound internet access —
# it only needs to reach the Docker socket on the host.
#
# networks:
#   socket-proxy:
#     internal: true
